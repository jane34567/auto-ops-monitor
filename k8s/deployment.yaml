apiVersion: apps/v1
kind: Deployment
metadata:
  name: auto-ops-monitor
  labels:
    app: auto-ops-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auto-ops-monitor
  template:
    metadata:
      labels:
        app: auto-ops-monitor
    spec:
      containers:
      - name: monitor
        image: nginx:latest
        imagePullPolicy: Always
